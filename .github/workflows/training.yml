name: Model Training Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn mlflow dagshub

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          echo "Menyelesaikan eksekusi MLflow..."

      - name: Install Python dependencies
        run: |
          echo "Dependencies checked."

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artefak
          path: mlruns/

      - name: Build Docker Model
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cc:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/cc:latest ${{ secrets.DOCKER_USERNAME }}/cc:v1

      - name: Push Docker Image
        run: docker push -a ${{ secrets.DOCKER_USERNAME }}/cc
